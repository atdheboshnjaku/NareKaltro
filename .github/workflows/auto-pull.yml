name: 🚀 SSH Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run_pull:
    name: run pull
    runs-on: ubuntu-latest

    steps:
    - name: 🖊 Write SSH keys
      run: |
        install -m 600 -D /dev/null ~/.ssh/id_rsa
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub
        echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

    - name: 🔗 Connect and Pull
      run: ssh -v ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ${{ vars.WORK_DIR }} && git checkout ${{ vars.MAIN_BRANCH }} && git pull && { test -f composer.phar || curl -sS https://getcomposer.org/composer-stable.phar -o composer.phar; } && php composer.phar install --no-dev --prefer-dist --optimize-autoloader --no-interaction --no-progress && exit"

    - name: 🧹 Cleanup
      run: rm -rf ~/.ssh
